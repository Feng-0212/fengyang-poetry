name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Override [SENSITIVE] placeholders with real Upstash values
        run: |
          ENV_FILE=".vercel/.env.production.local"
          [ -f "$ENV_FILE" ] || { echo "env file missing"; exit 1; }
          upsert() { local key="$1" val="$2"
            if [ -n "$val" ]; then
              if grep -q "^${key}=" "$ENV_FILE"; then
                sed -i "s|^${key}=.*$|${key}=${val}|" "$ENV_FILE"
              else
                echo "${key}=${val}" >> "$ENV_FILE"
              fi
            fi
          }
          upsert "UPSTASH_REDIS_REST_URL"   "${{ secrets.UPSTASH_REDIS_REST_URL }}"
          upsert "UPSTASH_REDIS_REST_TOKEN" "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}"
          upsert "KV_REST_API_URL"          "${{ secrets.UPSTASH_REDIS_REST_URL }}"
          upsert "KV_REST_API_TOKEN"        "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}"
          grep -E "^(REDIS_URL|UPSTASH_|KV_)" "$ENV_FILE" | sed 's/=.*/=***/'

      - name: Build Project Artifacts
        run: |
          set -a
          source .vercel/.env.production.local
          set +a
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
